services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scm_user
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
      POSTGRES_DB: scm_db_prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - scm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME:-midelivery}/scm-backend:${VERSION:-latest}
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=${VERSION:-1.0.0}
      - DATABASE_URL=postgresql://scm_user:${PROD_DB_PASSWORD}@postgres:5432/scm_db_prod
      - FEATURE_NEW_UI=false
      - FEATURE_DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - scm-network

  frontend:
    image: ${DOCKERHUB_USERNAME:-midelivery}/scm-frontend:${VERSION:-latest}
    ports:
      - "8082:80"
    environment:
      - VITE_API_URL=http://localhost:3002
    depends_on:
      - backend
    restart: always
    networks:
      - scm-network

  flyway:
    image: flyway/flyway:latest
    command: -url=jdbc:postgresql://postgres:5432/scm_db_prod -user=scm_user -password=${PROD_DB_PASSWORD} migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scm-network

volumes:
  postgres_data_prod:

networks:
  scm-network:
    driver: bridge
