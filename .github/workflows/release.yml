name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:${{ steps.tag.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:latest
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-frontend:${{ steps.tag.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/scm-frontend:latest
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: |
            ## Release ${{ steps.tag.outputs.version }}
            
            ### 🚀 Nuevas Características
            - Base de datos PostgreSQL con migraciones Flyway
            - Feature flags persistentes
            - Endpoints de health check y deployments
            - Stage environment configurado
            
            ### 📦 Artefactos
            - Backend: `${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:${{ steps.tag.outputs.version }}`
            - Frontend: `${{ secrets.DOCKERHUB_USERNAME }}/scm-frontend:${{ steps.tag.outputs.version }}`
            
            ### 🔧 Cómo desplegar
            ```bash
            export VERSION=${{ steps.tag.outputs.version }}
            docker-compose -f docker-compose.prod.yml up -d
draft: false
prerelease: false
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
